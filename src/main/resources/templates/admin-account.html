<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Quản lý Tài khoản</title>
  <link rel="stylesheet" th:href="@{/style.css}">
  <link rel="stylesheet" th:href="@{/dashboard.css}">
  <link rel="stylesheet" th:href="@{/admin.css}">

  <script th:src="@{/scripts.js}" defer></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a th:href="@{/admin}" style="text-decoration: none; display: block; cursor: pointer;">
          <div class="logo-wrapper">
            <div class="logo-icon-small">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
            </div>
            <h2 class="logo-text">Admin</h2>
          </div>
        </a>
      </div>
      <ul class="nav-links">
        <li>
          <a th:href="@{/admin}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Quản lý Khách hàng
          </a>
        </li>
        <li>
          <!-- Trạng thái active chuyển xuống mục Tài khoản -->
          <a th:href="@{/admin/accounts}" class="active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Quản lý Tài khoản
          </a>
        </li>
        <li>
          <a href="#">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            Quản lý Giao dịch
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <a href="#" class="logout-link" id="logoutLink">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Đăng xuất
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" placeholder="Tìm kiếm nhanh...">
        </div>
        <div class="user-profile">
          <span class="user-name" th:text="${username}">Quản trị viên</span>
          <div class="avatar" style="background-color: #ef4444;">AD</div>
        </div>
      </header>

      <div class="content-scroll-area">
        <div class="admin-container">
          
          <div class="page-header">
            <h2>Danh sách Tài khoản Khách hàng</h2>
          </div>

          <form th:action="@{/admin/account}" method="get" class="filter-bar admin-bento-card" style="overflow: visible;">
            <div class="search-wrapper" id="searchContainer">
              <input type="text" name="searchFullName" id="mainSearchInput" class="main-search-input" 
                     placeholder="Tìm kiếm theo Tên chủ tài khoản..." autocomplete="off" th:value="${param.searchFullName}">
              
              <div class="search-tags-container" id="activeSearchTags"></div>

              <div class="advanced-popup">
                  <input type="text" name="searchAccNum" placeholder="Nhập Số tài khoản..." th:value="${param.searchAccNum}">
              </div>
            </div>
            <button type="submit" class="btn-primary" style="padding: 0.65rem 1.25rem;">Lọc / Tìm kiếm</button>
          </form>

          <div class="table-container admin-bento-card flex-table-card">
            <div class="table-scroll-area">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Số Tài Khoản</th>
                    <th>Tên Chủ Tài Khoản</th>
                    <th>Ngày Mở</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="account : ${accountPage.content}">
                    <td><strong th:text="${account.accountNumber}" style="color: #2563eb;">0123456789</strong></td>
                    <td th:text="${account.user.fullName}">Nguyễn Văn A</td>
                    <td th:text="${#temporals.format(account.dateOpen, 'dd/MM/yyyy')}">21/07/2026</td>
                  </tr>
                  <tr th:if="${accountPage.empty}">
                    <td colspan="3" style="text-align: center; padding: 2rem; color: #64748b;">
                      Không tìm thấy tài khoản nào khớp với bộ lọc.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            
            <div class="pagination" th:if="${accountPage.totalPages > 0}">
                <a class="page-btn" 
                   th:if="${not accountPage.first}"
                   th:href="@{/admin/account(page=${accountPage.number - 1}, size=${accountPage.size}, searchAccNum=${searchAccNum}, searchFullName=${searchFullName})}">
                   Trước
                </a>
                <span class="page-btn disabled" th:if="${accountPage.first}">Trước</span>

                <a class="page-btn" 
                   th:each="i : ${#numbers.sequence(0, accountPage.totalPages - 1)}"
                   th:classappend="${accountPage.number == i} ? 'active' : ''"
                   th:href="@{/admin/account(page=${i}, size=${accountPage.size}, searchAccNum=${searchAccNum}, searchUsername=${searchUsername}, searchFullName=${searchFullName})}"
                   th:text="${i + 1}">1
                </a>

                <a class="page-btn" 
                   th:if="${not accountPage.last}"
                   th:href="@{/admin/account(page=${accountPage.number + 1}, size=${accountPage.size}, searchAccNum=${searchAccNum}, searchFullName=${searchFullName})}">
                   Sau
                </a>
                <span class="page-btn disabled" th:if="${accountPage.last}">Sau</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Pop-up Xác nhận đăng xuất -->
  <div th:replace="~{fragments :: confirmModal}"></div>

  <script>
    // Xử lý Pop-up Tìm kiếm nâng cao
    const searchContainer = document.getElementById('searchContainer');
    const mainSearchInput = document.getElementById('mainSearchInput');

    if (mainSearchInput) {
        mainSearchInput.addEventListener('focus', function() {
            searchContainer.classList.add('active');
        });
    }

    document.addEventListener('click', function(event) {
        if (searchContainer && !searchContainer.contains(event.target)) {
            searchContainer.classList.remove('active');
        }
    });

    // Xử lý tạo và xóa Tag tìm kiếm
    document.addEventListener("DOMContentLoaded", function() {
      const urlParams = new URLSearchParams(window.location.search);
      const tagsContainer = document.getElementById('activeSearchTags');
      
      let activeTags = [];

      const searchAccNum = urlParams.get('searchAccNum');
      if (searchAccNum && searchAccNum.trim() !== '') {
        activeTags.push({ text: searchAccNum.trim(), inputName: 'searchAccNum' });
      }

      const searchFullName = urlParams.get('searchFullName');
      if (searchFullName && searchFullName.trim() !== '') {
        activeTags.push({ text: searchFullName.trim(), inputName: 'searchFullName' });
      }

      const searchUsername = urlParams.get('searchUsername');
      if (searchUsername && searchUsername.trim() !== '') {
        activeTags.push({ text: searchUsername.trim(), inputName: 'searchUsername' });
      }

      if (activeTags.length > 0 && tagsContainer) {
        tagsContainer.innerHTML = '';
        const maxTags = 3;

        activeTags.forEach((tag, index) => {
          if (index < maxTags) {
            const tagElement = document.createElement('span');
            tagElement.className = 'search-tag';
            
            const tagText = document.createElement('span');
            tagText.textContent = tag.text;
            tagElement.appendChild(tagText);

            const closeBtn = document.createElement('button');
            closeBtn.type = 'button';
            closeBtn.className = 'tag-close-btn';
            closeBtn.innerHTML = '&times;';
            
            closeBtn.onclick = function(e) {
                e.preventDefault(); 
                document.querySelector(`input[name="${tag.inputName}"]`).value = '';
                document.querySelector('form.filter-bar').submit();
            };
            
            tagElement.appendChild(closeBtn);
            tagsContainer.appendChild(tagElement);
          }
        });

        if (activeTags.length > maxTags) {
            const dotsElement = document.createElement('span');
            dotsElement.className = 'search-tag-ellipsis';
            dotsElement.textContent = '...';
            tagsContainer.appendChild(dotsElement);
        }
      }
    });
  </script>
</body>
</html>
